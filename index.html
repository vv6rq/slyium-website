    function showToast(message) {
        const toast = document.getElementById('toast');
        toast.innerText = message;
        toast.classList.add('show');
        
        // Auto-hide the notification after 3 seconds
        setTimeout(() => {
            toast.classList.remove('show');
        }, 3000);
    }
